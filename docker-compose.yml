services:
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    volumes:
      - "zookeeper_data:/var/lib/zookeeper/data"
    environment:
      ZOO_CFG_EXTRA: "clientPort=2181"
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    restart: always
    volumes:
      - "kafka_data:/apache/kafka"
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    depends_on:
      - zookeeper
  mongodb:
    image: mongo:latest
    container_name: mongo-container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - "mongodb_data_container:/data/db"
    environment:
      MONGODB_DATABASE: eventstore
      MONGODB_USER: eventstore
      MONGODB_PASSWORD: eventstore
    networks:
      - cqskafkanetwork
      
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql2025
    hostname: sql2025
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrOngS@P@ssw0rd02"
      MSSQL_PID: "Express"
    restart: unless-stopped
volumes:
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local
  mongodb_data_container:
    driver: local
   
networks:
  cqskafkanetwork:
    driver: bridge
    
